events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ──────────────────────────────────────────
    sendfile        on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # ── Upstreams (Docker DNS resolves service names) ─────────
    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:3000;
    }

    # ═══════════════════════════════════════════════════════════
    #  PHASE 1 — HTTP only (no domain, no SSL)
    #  Access via: http://<your-vps-ip>
    # ═══════════════════════════════════════════════════════════
    server {
        listen 80;
        server_name _;          # matches any hostname / bare IP

        client_max_body_size 100M;

        # Health check
        location /health {
            proxy_pass http://backend/health;
            access_log off;
        }

        # Backend API — browser calls /api/... → backend:8000/...
        location /api/ {
            proxy_pass         http://backend/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Streaming / SSE support for LLM token-by-token output
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
            proxy_send_timeout 300s;
            proxy_set_header   Connection '';
            chunked_transfer_encoding on;
        }

        # Next.js frontend — catch-all
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade     $http_upgrade;
            proxy_set_header   Connection  'upgrade';
            proxy_set_header   Host        $host;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 120s;
        }
    }

    # ═══════════════════════════════════════════════════════════
